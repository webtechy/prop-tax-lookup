name: Monthly Property Tax API Lookup

on:
  schedule:
    - cron: '0 0 1 * *' # Runs 1st of every month at midnight UTC
  workflow_dispatch: # Allows manual trigger from the "Actions" tab

jobs:
  api-lookup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run API lookup script
        run: python proptaxlookup.py
        env:
          # These must exactly match the names of your GitHub Secrets!
          PROPERTY_ADDRESSES: ${{ secrets.PROPERTY_ADDRESSES }}
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
